; ============================================================================
; CI/CD Orchestrator - Configuração operacional central
; ============================================================================
; Este arquivo controla o comportamento operacional dos scripts do orquestrador.
;
; Regra de precedência:
; 1. argumento passado na CLI
; 2. valor salvo no YAML do workspace
; 3. valor definido aqui neste arquivo
; 4. fallback interno do código
;
; Leitura sugerida:
; 1. ajuste primeiro a seção [logging]
; 2. depois veja [defaults] e [git]
; 3. só então mexa em [promote], [prepare], [deploy] e [aidp]
;
; As seções abaixo foram organizadas em:
; - Uso frequente: parâmetros mais comuns no dia a dia
; - Uso avançado: parâmetros de backend, retry fino ou bootstrap interno
; ============================================================================

; ============================================================================
; USO FREQUENTE
; ============================================================================

[logging]
; Quantidade máxima de logs antigos mantidos por comando.
; Exemplo: com valor 5, o script preserva os 5 logs mais novos de
; `cicd-promote`, os 5 mais novos de `cicd-prepare` e assim por diante.
; Default: 5
max_log_files_per_command = 5


[defaults]
; Caminho default do arquivo YAML do workspace source.
; Example: if you run `python demo/cicd_seed.py` without `--config`,
; este caminho será usado.
; Default: source-workspace.yaml
source_config_path = source-workspace.yaml

; Caminho default do arquivo YAML do workspace target.
; Exemplo: se você roda `python cicd_deploy.py` sem `--config`,
; este caminho será usado.
; Default: target-workspace.yaml
target_config_path = target-workspace.yaml

; Método de autenticação default quando `--auth-method` não é informado.
; Exemplos válidos:
; - api_key
; - instance_principal
; - resource_principal
; - oke_workload_identity
;
; Uso:
; - api_key: execução local ou estação de trabalho
; - instance_principal: execução dentro de VM OCI
; - resource_principal: execução em serviço OCI com resource principal
; - oke_workload_identity: execução em workload dentro de cluster OKE
;
; Exemplo simples: `api_key`
; Default: api_key
auth_method = api_key

[git]
; Branch default usada no prepare quando `--branch` não é informado.
; Exemplo simples: main
; Default: main
branch = main

; Diretório pai no workspace onde a git folder será criada.
; Exemplo:
; /Workspace/cicd
; Resultado: /Workspace/cicd/oci-aidp-cicd-data
; Default: /Workspace/cicd
parent_dir = /Workspace/cicd

; Nome do bundle canônico de deploy no target.
; Exemplo: bundle
; Resultado: /Workspace/cicd/<repo>/bundle
; Default: bundle
bundle_name = bundle

; Nome do bundle de stage transportado via Git.
; Exemplo: bundle_stage
; Resultado: /Workspace/cicd/<repo>/bundle_stage
; Default: bundle_stage
stage_bundle_name = bundle_stage


[promote]
; Itens que devem ser preservados dentro do bundle de deploy no target
; quando o promote limpa o conteúdo antes de copiar o stage para dentro dele.
; Exemplo atual:
; - .aidp              -> metadados locais do bundle no target
; - aidp_workbench.yaml
; - .gitignore
; Default: .aidp, aidp_workbench.yaml, .gitignore
deploy_bundle_preserve_names = .aidp, aidp_workbench.yaml, .gitignore

; Tempo de espera antes de fazer git diff/commit após recriar o bundle_stage.
; Serve para dar tempo do backend refletir todas as mudanças.
; Exemplo: 20 = espera 20 segundos antes do commit.
; Default: 20
git_commit_stabilization_secs = 20

; Delays de retry usados nas limpezas mais pesadas do promote.
; Exemplo: 5, 10, 15
; Isso significa esperar 5s após a 1a falha, depois 10s e depois 15s.
; Default: 5, 10, 15
cleanup_retry_delays_secs = 5, 10, 15

; Delays de retry para a limpeza preparatória do destino antes de cópia.
; É uma limpeza mais leve, mas segue a mesma padronização de retries.
; Default: 5, 10, 15
copy_cleanup_retry_delays_secs = 5, 10, 15

; Delays de retry usados quando a criação do bundle falha porque ele ainda
; aparece como existente no backend.
; Exemplo: 5, 10, 15
; Default: 5, 10, 15
bundle_create_retry_delays_secs = 5, 10, 15

; Intervalo entre frames da animação ASCII de espera no terminal interativo.
; Exemplo: 0.2 = atualiza 5 vezes por segundo
; Default: 0.2
spinner_frame_interval_secs = 0.2


; ============================================================================
; USO AVANÇADO
; ============================================================================

[prepare]
; Nome do workflow temporário criado pelo `cicd_prepare.py target`
; apenas para bootstrap da shell do bundle de deploy.
; Exemplo: cicd_deploy_bundle_bootstrap_workflow
; Default: cicd_deploy_bundle_bootstrap_workflow
bootstrap_job_name = cicd_deploy_bundle_bootstrap_workflow

; Descrição do workflow temporário de bootstrap.
; Serve só para facilitar inspeção manual e troubleshooting.
; Exemplo: Temporary workflow used to bootstrap the target deploy bundle shell
; Default: Temporary workflow used to bootstrap the target deploy bundle shell
bootstrap_job_description = Temporary workflow used to bootstrap the target deploy bundle shell

; Pasta lógica onde o workflow temporário de bootstrap será criado.
; Exemplo comum: jobs
; Default: jobs
bootstrap_job_path = jobs

; Tempo máximo, em segundos, para confirmar que um objeto virou do tipo esperado.
; Exemplo: após criar o bundle de deploy, o script espera até 60s para
; confirmar que ele passou a ser visto como `BUNDLE`.
; Default: 60
workspace_item_type_timeout_secs = 60

; Descrição default usada quando o `cicd_prepare.py source` precisar criar
; automaticamente o workspace de origem.
; Exemplo: Source workspace used by the CI/CD workspace transport flow
; Default: Source workspace used by the CI/CD workspace transport flow
source_workspace_description = Source workspace used by the CI/CD workspace transport flow

; Descrição default usada quando o `cicd_prepare.py target` precisar criar
; automaticamente o workspace de destino.
; Exemplo: Target workspace used by the CI/CD workspace transport flow
; Default: Target workspace used by the CI/CD workspace transport flow
target_workspace_description = Target workspace used by the CI/CD workspace transport flow

[deploy]
; Delays de retry usados quando operações relacionadas a Git retornam
; erro transitório de parse da request.
; Exemplo: 5, 10, 15
; Significa:
; - a 1a tentativa continua imediata
; - se falhar por erro transitório, esperar 5s
; - se falhar de novo, esperar 10s
; - na última repetição, esperar 15s
; Default: 5, 10, 15
git_operation_parse_retry_delays_secs = 5, 10, 15

; Delays de retry usados quando o deploy do bundle falha com erro
; transitório de volume/backend do AIDP.
; Exemplo: 5, 10, 15
; Default: 5, 10, 15
bundle_deploy_retry_delays_secs = 5, 10, 15


[aidp]
; Prefixo principal da superfície de API usada para operações gerais.
; Normalmente não precisa mudar.
; Exemplo atual validado: dataLakes
; Default: dataLakes
path_prefix = dataLakes

; Prefixo da superfície de API usada para operações relacionadas a bundle.
; Em geral deve acompanhar o valor de `path_prefix`.
; Exemplo atual validado: dataLakes
; Default: dataLakes
bundle_path_prefix = dataLakes

; Versão da API usada para operações de bundle.
; Exemplo atual validado manualmente na console: 20240831
; Default: 20240831
bundle_api_version = 20240831

; Prefixo da superfície de API usada especificamente para deploy de bundle.
; Exemplo atual validado: dataLakes
; Default: dataLakes
deploy_bundle_path_prefix = dataLakes

; Versão da API usada especificamente para deploy de bundle.
; Exemplo atual validado: 20240831
; Default: 20240831
deploy_bundle_api_version = 20240831

; Define se as chamadas HTTPS validam certificado TLS.
; Use `true` no fluxo normal. Só use `false` para testes muito controlados.
; Exemplo: true
; Default: true
verify_tls = true

; Timeout HTTP padrão, em segundos, para chamadas REST gerais.
; Exemplo: 60 = uma chamada pode aguardar até 1 minuto antes de falhar.
; Default: 60
http_timeout_secs = 60

; Timeout HTTP específico para consultas de polling assíncrono.
; Use um valor menor que o timeout geral para evitar a sensação de travamento
; quando o backend demora a responder uma consulta de status.
; Exemplo: 10
; Default: 10
poll_http_timeout_secs = 10

; Intervalo, em segundos, entre consultas de polling.
; Afeta espera de async operations, deploy de bundle e estado de cluster.
; Exemplo: 5 significa consultar a cada 5 segundos.
; Default: 5
poll_interval_secs = 5

; Tempo máximo, em segundos, para operações com polling.
; Exemplo: 900 = 15 minutos
; Default: 900
poll_timeout_secs = 900
